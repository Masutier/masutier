{% extends 'home/home.html' %}
{% load static %}

{% block content %}

    <div class="col-md-11 p-4 boxtext1 c">
        <h1 class="c">Skills</h1>
    </div>

    <div class="col-md-11 p-4 boxtext1">
        <div class="row">
            {% for skl in skills %}
            <div class="col-md-5 mb-4">
                <div class="card boxtext1" >
                    <div class="card-body m-4">
                        <div class="card-subtitle">
                            <h4 class="card-title mt-1">{{skl.skill}}</h4>
                        </div>
                        
                        <h5 class="card-text">{{skl.description}}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">{{skl.dominium}}%</h6>
                    </div>
                    {% if user.is_authenticated %}
                    <div class="col-lg-6 mx-auto row ">
                        <div class="container col-lg-5 mb-4">
                            <td><a href="{% url 'editSkill' skl.id %}" class="btn btn-info btn-sm">Modificar</a></td>
                        </div>
                        <div class="container col-lg-5 mb-4">
                            <td><a href="{% url 'deleteSkill' skl.id %}" class="btn btn-danger btn-sm">Eliminar</a></td>
                        </div>
                    </div>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

{% endblock content %}
